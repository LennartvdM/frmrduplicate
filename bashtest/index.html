<!DOCTYPE html>
<!-- deploy: favicon verification -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neoflix</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&family=Cabin:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      // Early paint background fix: if landing directly on /neoflix, set base bg
      (function() {
        try {
          var p = window.location.pathname;
          if (p === '/neoflix' || p.indexOf('/neoflix') === 0) {
            document.documentElement.style.backgroundColor = '#483226';
            document.body.style.backgroundColor = '#483226';
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
