[build]
  command = "bash build.sh"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"
  # Pull submodule HEADs (docs-content) fresh on every build so the
  # live site tracks the latest GitBook push. The doc repo has its own
  # GitHub webhook pointed at Netlify's build hook for auto-rebuilds.
  GIT_LFS_ENABLED = "false"
  SUBMODULE_STRATEGY = "recursive"

# SPA routing for bashtest (React Router)
[[redirects]]
  from = "/bashtest/*"
  to = "/bashtest/index.html"
  status = 200

# SPA routing for frankenstein (React Router)
[[redirects]]
  from = "/frankenstein/*"
  to = "/frankenstein/index.html"
  status = 200

# Cache static assets
[[headers]]
  for = "/*/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Never cache HTML
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.htm"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
