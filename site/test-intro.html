<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IntroSlide Animation Debug</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Inter", sans-serif; background: #f5f5f5; }

    /* Console overlay — mirrors browser console output on-page */
    #debug-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 280px;
      background: rgba(0,0,0,0.92);
      color: #0f0;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 12px;
      line-height: 1.5;
      overflow-y: auto;
      padding: 8px 12px;
      z-index: 9999;
      border-top: 2px solid #333;
    }
    #debug-panel .log-entry { padding: 1px 0; border-bottom: 1px solid #1a1a1a; }
    #debug-panel .log-entry.warn { color: #ffa500; }
    #debug-panel .log-entry.error { color: #ff4444; }
    #debug-panel .time { color: #666; margin-right: 6px; font-size: 11px; }

    #controls {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 9999;
      display: flex;
      gap: 8px;
    }
    #controls button {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid #ccc;
      background: white;
      cursor: pointer;
      font-size: 13px;
    }
    #controls button:hover { background: #eee; }
    #controls button.active { background: #48c1c4; color: white; border-color: #48c1c4; }

    #variant-label {
      position: fixed;
      top: 14px;
      left: 12px;
      z-index: 9999;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="variant-label">variant: desktop</div>
  <div id="controls">
    <button onclick="setVariant('desktop')" class="active" id="btn-desktop">Desktop</button>
    <button onclick="setVariant('tablet')" id="btn-tablet">Tablet</button>
    <button onclick="setVariant('mobile')" id="btn-mobile">Mobile</button>
    <button onclick="clearDebugPanel()">Clear Log</button>
  </div>

  <div id="root"></div>
  <div id="debug-panel"></div>

  <!--
    Strategy: Load React + framer-motion from ESM CDN, then fetch our JSX
    component source files, transpile them in-browser via Babel standalone,
    and execute them. This avoids needing a build step.
  -->
  <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react-dom": "https://esm.sh/react-dom@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
      "framer-motion": "https://esm.sh/framer-motion@11.0.3?external=react,react-dom"
    }
  }
  </script>

  <script type="module">
    // -----------------------------------------------------------------------
    // 1. Debug panel — intercept console to mirror on-page
    // -----------------------------------------------------------------------
    const debugPanel = document.getElementById("debug-panel");
    const startTime = Date.now();

    function addLogEntry(level, args) {
      const entry = document.createElement("div");
      entry.className = `log-entry ${level}`;
      const elapsed = ((Date.now() - startTime) / 1000).toFixed(3);
      const text = args.map(a => {
        if (typeof a === "object") {
          try { return JSON.stringify(a, null, 0); }
          catch { return String(a); }
        }
        return String(a);
      }).join(" ");
      entry.innerHTML = `<span class="time">${elapsed}s</span>${escapeHtml(text)}`;
      debugPanel.appendChild(entry);
      debugPanel.scrollTop = debugPanel.scrollHeight;
    }

    function escapeHtml(s) {
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    const origLog = console.log;
    const origWarn = console.warn;
    const origError = console.error;
    console.log = (...a) => { origLog(...a); addLogEntry("log", a); };
    console.warn = (...a) => { origWarn(...a); addLogEntry("warn", a); };
    console.error = (...a) => { origError(...a); addLogEntry("error", a); };
    window.clearDebugPanel = () => { debugPanel.innerHTML = ""; };

    console.log("=== IntroSlide Animation Debug Harness ===");
    console.log("Open browser DevTools for full object inspection.");

    // -----------------------------------------------------------------------
    // 2. Fetch JSX source, transpile with Babel, execute as module
    // -----------------------------------------------------------------------
    import * as React from "react";
    import { createRoot } from "react-dom/client";
    import * as FramerMotion from "framer-motion";

    // Make these available globally so transpiled code can reference them
    window.__React = React;
    window.__FramerMotion = FramerMotion;

    /**
     * Fetch a .mjs file, transpile JSX, rewrite imports to use globals,
     * and execute it. Returns the module's exports.
     */
    async function loadJSXModule(path, deps = {}) {
      console.log(`fetching ${path}...`);
      const resp = await fetch(path);
      if (!resp.ok) throw new Error(`HTTP ${resp.status} for ${path}`);
      let source = await resp.text();

      // Rewrite bare imports to use window globals
      source = source
        .replace(/import\s*\{[^}]*\}\s*from\s*["']react["'];?/g,
          'const { useState, useEffect, useCallback, useMemo, useRef } = window.__React;')
        .replace(/import\s*\*\s*as\s+React\s+from\s*["']react["'];?/g,
          'const React = window.__React;')
        .replace(/import\s*\{[^}]*\}\s*from\s*["']framer-motion["'];?/g,
          'const { motion, useAnimationControls, AnimatePresence } = window.__FramerMotion;')
        // Remove local component imports — we'll inject them as deps
        .replace(/import\s+\w+\s+from\s*["']\.\/\w+\.mjs["'];?/g, '');

      // Transpile JSX → createElement
      console.log(`transpiling ${path} (${source.length} chars)...`);
      const transpiled = Babel.transform(source, {
        presets: ["react"],
        filename: path,
      }).code;

      // Execute in a function scope, injecting dependencies
      const moduleExports = {};
      const depNames = Object.keys(deps);
      const depValues = Object.values(deps);

      const wrappedCode = `
        let __default_export__;
        const __named_exports__ = {};
        ${transpiled
          .replace(/export\s+default\s+function\s+(\w+)/g,
            'function $1')
          .replace(/export\s+default\s+/g, '__default_export__ = ')
          .replace(/export\s+const\s+(\w+)/g, '__named_exports__.$1 = ')
          .replace(/export\s*\{[^}]*\}/g, '')
        }
        // Capture default export — check if a named function was defined
        ${transpiled.match(/export\s+default\s+function\s+(\w+)/)?.[1]
          ? `__default_export__ = ${transpiled.match(/export\s+default\s+function\s+(\w+)/)[1]};`
          : ''}
        return { default: __default_export__, ...__named_exports__ };
      `;

      try {
        const factory = new Function(...depNames, wrappedCode);
        const result = factory(...depValues);
        console.log(`${path} loaded OK:`, {
          default: typeof result.default,
          namedExports: Object.keys(result).filter(k => k !== 'default'),
        });
        return result;
      } catch (e) {
        console.error(`EXEC ERROR in ${path}:`, e.message);
        console.error("First 500 chars of transpiled:", wrappedCode.slice(0, 500));
        throw e;
      }
    }

    // -----------------------------------------------------------------------
    // 3. Load components in dependency order
    // -----------------------------------------------------------------------
    let IntroSlide = null;

    try {
      console.log("--- Loading NeoflixLogo ---");
      const logoMod = await loadJSXModule("../src/components/NeoflixLogo.mjs");
      const NeoflixLogo = logoMod.default;

      console.log("--- Loading RecordReflectRefine ---");
      const rrrMod = await loadJSXModule("../src/components/RecordReflectRefine.mjs");
      const RecordReflectRefine = rrrMod.default;

      console.log("--- Loading IntroSlide ---");
      const slideMod = await loadJSXModule("../src/components/IntroSlide.mjs", {
        NeoflixLogo,
        RecordReflectRefine,
      });
      IntroSlide = slideMod.default;

      console.log("=== All components loaded successfully ===");
    } catch (e) {
      console.error("FATAL: Component loading failed:", e.message);
      console.error(e.stack);
    }

    // -----------------------------------------------------------------------
    // 4. Render with variant switching
    // -----------------------------------------------------------------------
    const root = createRoot(document.getElementById("root"));
    let currentVariant = "desktop";
    const h = React.createElement;

    function render() {
      console.log(`--- rendering IntroSlide variant="${currentVariant}" ---`);

      if (!IntroSlide) {
        root.render(h("div", {
          style: { padding: 40, color: "red", fontSize: 20 }
        }, "Failed to load IntroSlide — check console errors above"));
        return;
      }

      root.render(
        h(IntroSlide, {
          variant: currentVariant,
          fullHeight: true,
          logoProps: { autoPlayDelay: 800 },
          style: { marginBottom: 280 },
        })
      );
    }

    window.setVariant = (v) => {
      currentVariant = v;
      document.getElementById("variant-label").textContent = `variant: ${v}`;
      document.querySelectorAll("#controls button").forEach(b => b.classList.remove("active"));
      document.getElementById(`btn-${v}`).classList.add("active");
      render();
    };

    render();
  </script>
</body>
</html>
