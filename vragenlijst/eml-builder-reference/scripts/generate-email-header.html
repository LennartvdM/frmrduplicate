<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Email Header Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: Inter, sans-serif; background: #f5f5f5; padding: 40px; }
    .controls { margin-bottom: 20px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .controls label { font-size: 14px; font-weight: 500; }
    .controls input { padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
    .controls input[type="number"] { width: 80px; }
    .controls button { padding: 8px 16px; background: #111162; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; }
    .controls button:hover { background: #07072f; }
    canvas { display: block; margin: 20px 0; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
    .info { font-size: 13px; color: #666; margin-top: 8px; }
  </style>
</head>
<body>
  <h2>Email Header PNG Generator</h2>
  <div class="controls">
    <label>Line 1: <input type="text" id="line1" value="Commissie Monitoring Talent naar de Top"></label>
    <label>Line 2: <input type="text" id="line2" value="Monitor Executive Search"></label>
    <label>Width: <input type="number" id="width" value="1200"></label>
    <label>Radius: <input type="number" id="radius" value="32"></label>
    <button onclick="render()">Render</button>
    <button onclick="download()">Download PNG</button>
  </div>
  <canvas id="c"></canvas>
  <p class="info">Width 1200 = 2x retina for 600px email. Adjust radius for corner rounding (top corners only).</p>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    function render() {
      const W = parseInt(document.getElementById('width').value) || 1200;
      const R = parseInt(document.getElementById('radius').value) || 32;
      const line1 = document.getElementById('line1').value;
      const line2 = document.getElementById('line2').value;

      // Height proportional to width (matching the ~92px at 600px)
      const scale = W / 600;
      const H = Math.round(92 * scale);
      canvas.width = W;
      canvas.height = H;

      // Draw rounded-top rectangle
      ctx.beginPath();
      ctx.moveTo(R, 0);
      ctx.lineTo(W - R, 0);
      ctx.quadraticCurveTo(W, 0, W, R);
      ctx.lineTo(W, H);
      ctx.lineTo(0, H);
      ctx.lineTo(0, R);
      ctx.quadraticCurveTo(0, 0, R, 0);
      ctx.closePath();

      // Gradient fill (135deg diagonal: top-left to bottom-right)
      const grad = ctx.createLinearGradient(0, 0, W, H);
      grad.addColorStop(0, '#8caef4');
      grad.addColorStop(1, '#111162');
      ctx.fillStyle = grad;
      ctx.fill();

      // Line 1 (sender name — smaller, semi-transparent)
      const fontSize1 = Math.round(14 * scale);
      ctx.font = `500 ${fontSize1}px Inter, sans-serif`;
      ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(line1, W / 2, H * 0.38);

      // Line 2 (heading — larger, bold, white)
      const fontSize2 = Math.round(26 * scale);
      ctx.font = `700 ${fontSize2}px Inter, sans-serif`;
      ctx.fillStyle = '#ffffff';
      ctx.fillText(line2, W / 2, H * 0.68);
    }

    function download() {
      const link = document.createElement('a');
      link.download = 'email-header.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    // Wait for font to load, then render
    document.fonts.ready.then(() => render());
  </script>
</body>
</html>
