# Netlify configuration for Monitoring Cultureel Talent naar de Top

[build]
  command = "npm run build && npm run build:html"
  publish = "."

# Proxy API calls to Google Apps Script via a Netlify Function.
# The function follows GAS's internal redirects server-side and returns a
# clean response, so clients whose firewalls block script.google.com can
# still reach the backend.
# Two rules needed: /api/ (exact) and /api/* (sub-paths) because the
# wildcard * requires at least one character and won't match /api/?query=...
[[redirects]]
  from = "/api/"
  to = "/.netlify/functions/gas-proxy"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/gas-proxy"
  status = 200
  force = true

# Serve index.html for /inkijkexemplaar so it works as a direct URL
[[redirects]]
  from = "/inkijkexemplaar"
  to = "/index.html"
  status = 200
  force = true

# Serve handleiding.html for /handleiding (clean URL)
[[redirects]]
  from = "/handleiding"
  to = "/handleiding.html"
  status = 200
  force = true

# Hidden playground for Surface preview experiments
[[redirects]]
  from = "/xq7k-preview-lab"
  to = "/tools/playground.html"
  status = 200
  force = true

# Hidden Email CMS for sending styled invitation emails
[[redirects]]
  from = "/m9v2-email-cms"
  to = "/tools/email-admin.html"
  status = 200
  force = true

# Hidden manual email sender (no DNS required — send from own mail client)
[[redirects]]
  from = "/m9v2-email-handmatig"
  to = "/tools/email-manual.html"
  status = 200
  force = true

# Printable (blank) survey — A4-friendly, no personal info
[[redirects]]
  from = "/printbare-vragenlijst"
  to = "/tools/printbare-vragenlijst.html"
  status = 200
  force = true

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://script.google.com https://script.googleusercontent.com; img-src 'self' data: https://monitoringtalentnaardetop.nl; frame-src 'self' blob:; frame-ancestors 'none'"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# No aggressive caching during development - let browser check for updates
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"
